<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registrasi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="d-flex align-items-center justify-content-center">
    <div class="card shadow-lg p-4" style="width: 380px;">
        <div class="text-center mb-4">
            <div class="fs-1">📜</div>
            <h4 class="fw-bold">Buat Akun Baru</h4>
        </div>

        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Pilih username" required />
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Buat password"
                    required />
            </div>
            <button type="submit" class="btn btn-success w-100 py-2">Daftar Sekarang</button>
        </form>

        <hr />
        <p class="text-center small text-white mb-0">
            Sudah punya akun? <a th:href="@{/login}" >Login di sini</a>
        </p>
    </div>
</body>

</html>
