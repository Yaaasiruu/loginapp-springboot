<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4>🔒 Halaman Admin</h4>
            </div>
            <div class="card-body">

                <p>Selamat datang,
                    <strong sec:authentication="name"></strong>!
                </p>

                <hr>

                <h5>Data Mahasiswa</h5>

                <table class="table table-bordered table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th width="180">Aksi</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.role}"></td>

                            <td>
                                <a th:href="@{/admin/edit/{id}(id=${user.id})}" class="btn btn-warning btn-sm">
                                    Edit
                                </a>

                                <a th:href="@{/admin/delete/{id}(id=${user.id})}" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Yakin ingin menghapus user ini?')">
                                    Hapus
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <a th:href="@{/dashboard}" class="btn btn-secondary">
                    Kembali ke Dashboard
                </a>

                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger">
                        Logout
                    </button>
                </form>

            </div>
        </div>
    </div>
</body>

</html>
